<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <style>
    :root {
      --color-primary: #8b5cf6;
      --color-secondary: #06b6d4;
      --color-accent: #f43f5e;
    }
  </style>
  <rect width="256" height="256" fill="none"/>
  <circle cx="128" cy="128" r="96" fill="url(#grad)" stroke="#111827" stroke-width="8"/>
  <circle cx="128" cy="128" r="80" fill="#030712" />
  <polyline points="128 72 128 128 168 168" fill="none" stroke="var(--color-accent)" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/>
  
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:var(--color-primary);stop-opacity:1" />
      <stop offset="100%" style="stop-color:var(--color-secondary);stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
